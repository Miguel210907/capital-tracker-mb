name: Build unsigned iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-ios-unsigned-ipa:
    name: Build unsigned IPA for AltStore
    runs-on: macos-26
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Select stable Xcode 26
        run: |
          set -euo pipefail
          echo "Available Xcode apps:"
          ls -1 /Applications | grep -E '^Xcode' || true

          XCODE_APP="$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' | sort | tail -n 1)"
          if [ -z "$XCODE_APP" ] && [ -d /Applications/Xcode.app ]; then
            XCODE_APP="/Applications/Xcode.app"
          fi

          if [ -z "$XCODE_APP" ]; then
            echo "::error::No Xcode app found on this runner."
            exit 1
          fi

          echo "Selecting $XCODE_APP"
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"

          xcode-select -p
          xcodebuild -version

          if ! xcodebuild -version | grep -q '^Xcode 26'; then
            echo "::error::Expo SDK 55 needs Xcode 26.x here. The selected Xcode is:"
            xcodebuild -version
            echo "Use runs-on: macos-26 and make sure this updated workflow is committed and pushed."
            exit 1
          fi

      - name: Show tool versions
        run: |
          node --version
          npm --version
          xcodebuild -version
          pod --version

      - name: Install JavaScript dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate native iOS project
        env:
          EXPO_NO_GIT_STATUS: "1"
          CI: "1"
        run: npx expo prebuild --platform ios --clean --non-interactive --no-install

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Detect Xcode workspace and scheme
        id: xcode
        run: |
          WORKSPACE="$(find ios -name "*.xcworkspace" -type d -prune | head -n 1)"
          if [ -z "$WORKSPACE" ]; then
            echo "No .xcworkspace found under ios/"
            exit 1
          fi

          SCHEME="$(basename "$WORKSPACE" .xcworkspace)"
          if ! xcodebuild -list -workspace "$WORKSPACE" | grep -q "^[[:space:]]*$SCHEME$"; then
            SCHEME="$(xcodebuild -list -json -workspace "$WORKSPACE" | ruby -rjson -e 'data = JSON.parse(STDIN.read); schemes = data.dig("workspace", "schemes") || []; puts(schemes.find { |s| !s.end_with?("Tests") } || schemes.first || "")')"
          fi

          if [ -z "$SCHEME" ]; then
            echo "No Xcode scheme found"
            exit 1
          fi

          echo "workspace=$WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Using workspace: $WORKSPACE"
          echo "Using scheme: $SCHEME"

      - name: Build unsigned .app for iPhone
        id: build_app
        run: |
          set -euo pipefail
          WORKSPACE="${{ steps.xcode.outputs.workspace }}"
          SCHEME="${{ steps.xcode.outputs.scheme }}"
          DERIVED_DATA="$PWD/build/DerivedData"
          BUILD_DIR="$PWD/build/xcode"
          LOG_DIR="$PWD/build/logs"
          mkdir -p "$LOG_DIR"

          set +e
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$DERIVED_DATA" \
            -destination generic/platform=iOS \
            clean build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            AD_HOC_CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO \
            BUILD_DIR="$BUILD_DIR" \
            2>&1 | tee "$LOG_DIR/xcodebuild.log"

          STATUS=${PIPESTATUS[0]}
          if [ "$STATUS" -ne 0 ]; then
            echo "::error::xcodebuild failed with status $STATUS. Showing last 200 log lines."
            echo "---- xcodebuild extracted errors ----"
            grep -n -Ei "error:|fatal error:|warning:.*will be treated as an error|CodeSign|Signing for|Provisioning profile|No profiles|requires a development team|Command .* failed|BUILD FAILED|Ld |SwiftCompile|CompileC" "$LOG_DIR/xcodebuild.log" | tail -n 120 || true
            echo "---- xcodebuild log tail ----"
            tail -n 200 "$LOG_DIR/xcodebuild.log"
            exit "$STATUS"
          fi

      - name: Upload Xcode build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: xcodebuild-log
          path: build/logs/xcodebuild.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH="$(find build -type d -path "*/Release-iphoneos/*.app" -print | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app found after xcodebuild"
            find build -type d -name "*.app" -print
            exit 1
          fi

          rm -rf ipa Payload
          mkdir -p Payload ipa
          cp -R "$APP_PATH" Payload/
          /usr/bin/zip -qry "ipa/CapitalTrackerMB-unsigned.ipa" Payload
          shasum -a 256 "ipa/CapitalTrackerMB-unsigned.ipa" > "ipa/CapitalTrackerMB-unsigned.ipa.sha256"
          ls -lh ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v7
        with:
          name: CapitalTrackerMB-unsigned-ipa
          path: |
            ipa/CapitalTrackerMB-unsigned.ipa
            ipa/CapitalTrackerMB-unsigned.ipa.sha256
          if-no-files-found: error
          retention-days: 14
